name: Build Android APKs

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Source preflight
        run: python3 tools/verify_source.py

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Show tool versions
        run: |
          java -version
          gradle --version
          sdkmanager --list_installed

      - name: Build phone and watch debug APKs
        run: gradle --no-daemon --stacktrace --warning-mode all :phone:assembleDebug :watch:assembleDebug

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp phone/build/outputs/apk/debug/phone-debug.apk artifacts/baby-monitor-phone-v0.5.1-debug.apk
          cp watch/build/outputs/apk/debug/watch-debug.apk artifacts/baby-monitor-watch-v0.5.1-debug.apk

      - name: Upload installable APKs
        uses: actions/upload-artifact@v4
        with:
          name: baby-monitor-v0.5.1-debug-apks
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 14
